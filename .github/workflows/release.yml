name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # Compile sky-env from Sky source on Linux x64, then upload the
  # generated Go source so each target platform can cross-compile it.
  compile-sky:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install sky compiler
        run: |
          curl -fsSL https://github.com/anzellai/sky/releases/latest/download/sky-linux-x64 -o /usr/local/bin/sky
          chmod +x /usr/local/bin/sky
          sky --version

      - name: Compile sky-env to Go source
        run: |
          rm -rf sky-out .skycache
          sky install
          sky build src/Main.sky

      - name: Upload Go source
        uses: actions/upload-artifact@v4
        with:
          name: sky-env-go-source
          path: |
            sky-out/main.go
            sky-out/go.mod
            sky-out/go.sum
            sky-out/sky_wrappers/
            sky-out/skydb_runtime.go

  # Cross-compile the generated Go source for each target platform.
  build:
    needs: compile-sky
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: sky-env-linux-x64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            artifact: sky-env-linux-arm64
          - os: ubuntu-latest
            goos: darwin
            goarch: amd64
            artifact: sky-env-darwin-x64
          - os: ubuntu-latest
            goos: darwin
            goarch: arm64
            artifact: sky-env-darwin-arm64
          - os: ubuntu-latest
            goos: windows
            goarch: amd64
            artifact: sky-env-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Download Go source
        uses: actions/download-artifact@v4
        with:
          name: sky-env-go-source
          path: sky-out

      - name: Build binary
        run: |
          cd sky-out
          VERSION="${GITHUB_REF_NAME}"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -gcflags="all=-l" \
                     -ldflags="-s -w -X main.skyVersion=${VERSION}" \
                     -o ../${{ matrix.artifact }} .
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            [[ "$dir" == *"sky-env-go-source"* ]] && continue
            cp "$dir"* release/ 2>/dev/null || true
          done
          ls -la release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
